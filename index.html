<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Ultra</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0084ff; --bg: #ffffff; --light-bg: #f0f2f5; --text: #050505; --gray: #65676b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; text-align: center; }
        .auth-card input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; background: var(--light-bg); border: none; }
        .btn-blue { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* Layout */
        #app { display: none; width: 100%; height: 100%; grid-template-columns: 360px 1fr; }
        @media (max-width: 768px) { 
            #app { grid-template-columns: 1fr; }
            .sidebar { display: flex; width: 100%; }
            .main-chat { display: none; position: fixed; inset: 0; z-index: 100; }
            .main-chat.active { display: flex; }
        }

        /* Sidebar */
        .sidebar { background: white; border-right: 1px solid #ddd; flex-direction: column; display: flex; }
        .sb-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .sb-header h2 { margin: 0; font-size: 1.5rem; }
        .search-bar { padding: 10px 15px; }
        .search-bar input { width: 100%; padding: 10px; border-radius: 20px; border: none; background: var(--light-bg); outline: none; }
        
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .chat-item:active { background: #f0f2f5; }
        .chat-item img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-info div { display: flex; justify-content: space-between; }
        .chat-name { font-weight: 600; margin-bottom: 2px; }
        .chat-last { font-size: 0.85rem; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Chat */
        .main-chat { flex-direction: column; background: white; }
        .chat-header { padding: 10px 15px; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 10px; }
        .back-btn { display: none; cursor: pointer; font-size: 1.5rem; padding-right: 10px; }
        @media (max-width: 768px) { .back-btn { display: block; } }
        
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .msg { max-width: 75%; padding: 8px 14px; border-radius: 18px; font-size: 0.95rem; position: relative; }
        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: var(--light-bg); color: black; border-bottom-left-radius: 4px; }
        .status { font-size: 0.7rem; margin-left: 5px; float: right; margin-top: 5px; }

        .typing { font-size: 0.8rem; color: var(--gray); padding: 5px 20px; height: 20px; }
        .input-area { padding: 10px 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 10px 15px; border-radius: 20px; border: none; background: var(--light-bg); outline: none; }
        .send-btn { color: var(--primary); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color: var(--primary)">Gemini</h1>
        <input type="text" id="auth-user" placeholder="Username">
        <input type="password" id="auth-pass" placeholder="Password">
        <button class="btn-blue" onclick="handleAuth('login')">Войти</button>
        <button style="background:none; border:none; color:var(--gray); margin-top:15px; cursor:pointer" onclick="handleAuth('reg')">Нет аккаунта? Создать</button>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div class="sb-header">
            <h2>Чаты</h2>
            <span onclick="logout()" style="color:red; cursor:pointer; font-size:0.8rem">Выйти</span>
        </div>
        <div class="search-bar">
            <input type="text" id="search-inp" placeholder="Поиск @username" onkeypress="if(event.key==='Enter') search()">
        </div>
        <div class="chats-list" id="list"></div>
    </div>

    <div class="main-chat" id="chat-window">
        <div class="chat-header">
            <span class="back-btn" onclick="closeChat()">←</span>
            <img id="h-ava" src="" style="width:35px;height:35px;border-radius:50%;display:none">
            <div>
                <div id="h-name" style="font-weight:600">Выберите чат</div>
                <div id="h-status" style="font-size:0.75rem; color:var(--gray)"></div>
            </div>
        </div>
        <div id="messages"></div>
        <div class="typing" id="typing-text"></div>
        <div class="input-area">
            <input type="text" id="m-inp" placeholder="Сообщение..." oninput="isTyping()" onkeypress="if(event.key==='Enter') send()">
            <div class="send-btn" onclick="send()">Отправить</div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBUQexpjqaVk9P4UFmLBHOdFsx_2qIvE5U",
    authDomain: "gpt-and-gemini.firebaseapp.com",
    databaseURL: "https://gpt-and-gemini-default-rtdb.firebaseio.com",
    projectId: "gpt-and-gemini",
    storageBucket: "gpt-and-gemini.firebasestorage.app",
    messagingSenderId: "84168754052",
    appId: "1:84168754052:web:e861b9700826e1ec8893d1"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const sound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

let me = null;
let activeChatId = null;
let typingTimeout;

// AUTH - LOGIN BY USERNAME
async function handleAuth(type) {
    const user = document.getElementById('auth-user').value.toLowerCase().trim();
    const pass = document.getElementById('auth-pass').value;
    const email = user + "@messenger.com"; // Маскируем ник под email

    try {
        if (type === 'reg') {
            const check = await db.ref('usernames/'+user).once('value');
            if (check.exists()) return alert("Занят!");
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            await db.ref('users/'+res.user.uid).set({
                uid: res.user.uid, username: user,
                photoURL: `https://ui-avatars.com/api/?name=${user}&background=random`,
                isOnline: true
            });
            await db.ref('usernames/'+user).set(res.user.uid);
        } else {
            await auth.signInWithEmailAndPassword(email, pass);
        }
    } catch(e) { alert("Ошибка: " + e.message); }
}

auth.onAuthStateChanged(u => {
    if (u) {
        me = u;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'grid';
        db.ref('users/'+me.uid).update({isOnline: true});
        db.ref('users/'+me.uid).onDisconnect().update({isOnline: false, lastSeen: Date.now()});
        loadChats();
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }
});

function logout() { auth.signOut(); }

// CHATS & SEARCH
async function search() {
    const name = document.getElementById('search-inp').value.toLowerCase().trim();
    const s = await db.ref('usernames/'+name).once('value');
    if (!s.exists()) return alert("Нет такого");
    const cid = [me.uid, s.val()].sort().join('_');
    await db.ref(`userChats/${me.uid}/${cid}`).set(true);
    await db.ref(`userChats/${s.val()}/${cid}`).set(true);
    openChat(cid, name);
}

function loadChats() {
    db.ref(`userChats/${me.uid}`).on('value', async snap => {
        const list = document.getElementById('list');
        list.innerHTML = '';
        for (let cid in (snap.val() || {})) {
            const fUid = cid.replace(me.uid,'').replace('_','');
            const u = (await db.ref('users/'+fUid).once('value')).val();
            const lastMsg = (await db.ref('chats/'+cid+'/lastMessage').once('value')).val() || {text: 'Нет сообщений'};
            
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                <img src="${u.photoURL}">
                <div class="chat-info">
                    <div><span class="chat-name">${u.username}</span></div>
                    <div class="chat-last">${lastMsg.text}</div>
                </div>
            `;
            div.onclick = () => openChat(cid, u.username, u.photoURL);
            list.appendChild(div);
        }
    });
}

// MESSAGING
function openChat(cid, name, ava) {
    activeChatId = cid;
    document.getElementById('chat-window').classList.add('active');
    document.getElementById('h-name').innerText = name;
    document.getElementById('h-ava').src = ava;
    document.getElementById('h-ava').style.display = 'block';
    
    const box = document.getElementById('messages');
    box.innerHTML = '';
    
    // Typing Indicator Listen
    const fUid = cid.replace(me.uid,'').replace('_','');
    db.ref(`typing/${cid}/${fUid}`).on('value', s => {
        document.getElementById('typing-text').innerText = s.val() ? name + ' печатает...' : '';
    });

    db.ref(`messages/${cid}`).off();
    db.ref(`messages/${cid}`).on('child_added', snap => {
        const m = snap.val();
        
        // Mark as Read if received
        if (m.senderId !== me.uid && !m.read) {
            db.ref(`messages/${cid}/${snap.key}`).update({read: true});
        }
        
        if (m.senderId !== me.uid) sound.play().catch(()=>{});

        renderMsg(m, snap.key);
    });

    // Listen for read updates (✓✓)
    db.ref(`messages/${cid}`).on('child_changed', snap => {
        const el = document.getElementById('status-'+snap.key);
        if (el && snap.val().read) el.innerText = ' ✓✓'; el.style.color = '#3498db';
    });
}

function renderMsg(m, id) {
    const box = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = `msg ${m.senderId === me.uid ? 'sent' : 'received'}`;
    const status = m.senderId === me.uid ? `<span class="status" id="status-${id}" style="color:${m.read?'#3498db':'#fff'}">${m.read?' ✓✓':' ✓'}</span>` : '';
    d.innerHTML = `${m.text} ${status}`;
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
}

function send() {
    const inp = document.getElementById('m-inp');
    if (!inp.value.trim() || !activeChatId) return;
    const m = { senderId: me.uid, text: inp.value.trim(), timestamp: Date.now(), read: false };
    db.ref(`messages/${activeChatId}`).push(m);
    db.ref(`chats/${activeChatId}/lastMessage`).set(m);
    inp.value = '';
    db.ref(`typing/${activeChatId}/${me.uid}`).set(false);
}

function isTyping() {
    if (!activeChatId) return;
    db.ref(`typing/${activeChatId}/${me.uid}`).set(true);
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
        db.ref(`typing/${activeChatId}/${me.uid}`).set(false);
    }, 2000);
}

function closeChat() { document.getElementById('chat-window').classList.remove('active'); }
</script>
</body>
</html>
