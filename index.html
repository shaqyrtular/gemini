<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Messenger</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        :root { --main-color: #6e57e0; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        input { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 8px; width: 250px; }
        button { padding: 10px 20px; background: var(--main-color); color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* Main Layout */
        #app { display: none; width: 100%; height: 100%; grid-template-columns: 300px 1fr; }
        
        /* Sidebar */
        .sidebar { background: white; border-right: 1px solid #eee; display: flex; flex-direction: column; }
        .user-profile { padding: 20px; border-bottom: 1px solid #eee; text-align: center; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #eee; }
        .search-box { padding: 10px; }
        .friends-list { flex: 1; overflow-y: auto; }
        .friend-item { padding: 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; display: flex; align-items: center; }
        .friend-item:hover { background: #f0edff; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-left: auto; }
        .online { background: #2ecc71; }
        .offline { background: #95a5a6; }

        /* Chat Area */
        .chat-area { display: flex; flex-direction: column; background: #fff; }
        .chat-header { padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 10px 15px; border-radius: 15px; max-width: 70%; word-wrap: break-word; }
        .msg.sent { align-self: flex-end; background: var(--main-color); color: white; }
        .msg.received { align-self: flex-start; background: #eee; color: #333; }
        
        .input-area { padding: 20px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #msg-input { flex: 1; }
        .emoji-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2>Gemini Messenger</h2>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <input type="text" id="auth-user" placeholder="Юзернейм (без @)">
        <div style="margin-top: 10px;">
            <button onclick="handleAuth('login')">Войти</button>
            <button onclick="handleAuth('register')">Регистрация</button>
        </div>
    </div>

    <div id="app">
        <div class="sidebar">
            <div class="user-profile">
                <img id="my-ava" class="avatar" src="https://ui-avatars.com/api/?name=User" onclick="uploadAva()">
                <div id="my-name" style="font-weight: bold; margin-top: 5px;"></div>
                <div id="my-username" style="color: #888; font-size: 0.9rem;"></div>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Найти @username..." style="width: 90%;">
                <button onclick="searchFriend()" style="width: 97%; margin-top: 5px;">Найти</button>
            </div>
            <div class="friends-list" id="friends-list"></div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="chat-with">Выберите чат</div>
            <div id="messages"></div>
            <div class="input-area">
                <button class="emoji-btn" onclick="addEmoji('😊')">😊</button>
                <input type="text" id="msg-input" placeholder="Сообщение...">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        // КОНФИГ
        const firebaseConfig = {
            apiKey: "AIzaSyBUQexpjqaVk9P4UFmLBHOdFsx_2qIvE5U",
            authDomain: "gpt-and-gemini.firebaseapp.com",
            databaseURL: "https://gpt-and-gemini-default-rtdb.firebaseio.com",
            projectId: "gpt-and-gemini",
            storageBucket: "gpt-and-gemini.firebasestorage.app",
            messagingSenderId: "84168754052",
            appId: "1:84168754052:web:e861b9700826e1ec8893d1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        let currentUser = null;
        let activeChatId = null;

        // AUTH
        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const username = document.getElementById('auth-user').value.toLowerCase().trim();

            try {
                if (type === 'register') {
                    const userCheck = await db.ref('usernames/' + username).once('value');
                    if (userCheck.exists()) return alert('Username занят!');
                    
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.ref('users/' + res.user.uid).set({
                        username: username,
                        displayName: username,
                        photoURL: `https://ui-avatars.com/api/?name=${username}`,
                        isOnline: true,
                        lastSeen: Date.now()
                    });
                    await db.ref('usernames/' + username).set(res.user.uid);
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch (e) { alert(e.message); }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                initUser();
            }
        });

        async function initUser() {
            const snap = await db.ref('users/' + currentUser.uid).once('value');
            const data = snap.val();
            document.getElementById('my-name').innerText = data.displayName;
            document.getElementById('my-username').innerText = '@' + data.username;
            document.getElementById('my-ava').src = data.photoURL;

            // Online status
            const statusRef = db.ref('users/' + currentUser.uid);
            db.ref('.info/connected').on('value', snap => {
                if (snap.val() === false) return;
                statusRef.onDisconnect().update({ isOnline: false, lastSeen: Date.now() }).then(() => {
                    statusRef.update({ isOnline: true, lastSeen: Date.now() });
                });
            });

            loadMyChats();
        }

        // ПОИСК И ДРУЗЬЯ
        async function searchFriend() {
            const target = document.getElementById('search-input').value.toLowerCase().trim();
            const snap = await db.ref('usernames/' + target).once('value');
            if (!snap.exists()) return alert('Пользователь не найден');
            
            const friendUid = snap.val();
            if (friendUid === currentUser.uid) return alert('Это вы!');
            
            const chatId = [currentUser.uid, friendUid].sort().join('_');
            await db.ref(`userChats/${currentUser.uid}/${chatId}`).set(true);
            await db.ref(`userChats/${friendUid}/${chatId}`).set(true);
            openChat(chatId, target);
        }

        function loadMyChats() {
            db.ref(`userChats/${currentUser.uid}`).on('value', async snap => {
                const list = document.getElementById('friends-list');
                list.innerHTML = '';
                const chats = snap.val() || {};
                
                for (let chatId in chats) {
                    const friendUid = chatId.replace(currentUser.uid, '').replace('_', '');
                    const uSnap = await db.ref(`users/${friendUid}`).once('value');
                    const uData = uSnap.val();
                    
                    const div = document.createElement('div');
                    div.className = 'friend-item';
                    div.innerHTML = `
                        <img src="${uData.photoURL}" class="avatar" style="width:40px;height:40px;margin-right:10px">
                        <div>
                            <div style="font-weight:500">${uData.displayName}</div>
                            <div style="font-size:0.8rem;color:#888">@${uData.username}</div>
                        </div>
                        <div class="status-dot ${uData.isOnline ? 'online' : 'offline'}"></div>
                    `;
                    div.onclick = () => openChat(chatId, uData.displayName);
                    list.appendChild(div);
                }
            });
        }

        // ЧАТ
        function openChat(chatId, name) {
            activeChatId = chatId;
            document.getElementById('chat-with').innerText = 'Чат с: ' + name;
            const msgContainer = document.getElementById('messages');
            msgContainer.innerHTML = '';
            
            db.ref(`messages/${chatId}`).off();
            db.ref(`messages/${chatId}`).limitToLast(50).on('child_added', snap => {
                const m = snap.val();
                const d = document.createElement('div');
                d.className = `msg ${m.senderId === currentUser.uid ? 'sent' : 'received'}`;
                d.innerText = m.text;
                msgContainer.appendChild(d);
                msgContainer.scrollTop = msgContainer.scrollHeight;
            });
        }

        async function sendMessage() {
            const text = document.getElementById('msg-input').value.trim();
            if (!text || !activeChatId) return;

            const msgData = {
                senderId: currentUser.uid,
                text: text,
                timestamp: Date.now()
            };

            await db.ref(`messages/${activeChatId}`).push(msgData);
            await db.ref(`chats/${activeChatId}`).update({
                lastMessage: msgData,
                participants: { [currentUser.uid]: true } // Вторая сторона обновится сама при входе
            });
            document.getElementById('msg-input').value = '';
        }

        function addEmoji(emoji) {
            document.getElementById('msg-input').value += emoji;
        }

        function uploadAva() {
            const url = prompt("Введите ссылку на фото (или используйте стандартную):");
            if (url) {
                db.ref('users/' + currentUser.uid).update({ photoURL: url });
                document.getElementById('my-ava').src = url;
            }
        }
    </script>
</body>
</html>
